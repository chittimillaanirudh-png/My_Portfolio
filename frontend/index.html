<!DOCTYPE html>
<html class="dark" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>PORTFOLIO | Anirudh Chittimilla</title>
    
    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;300;400;500;600;700&family=Manrope:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    
    <!-- Material Symbols for elegant UI icon accents -->
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
      rel="stylesheet"
    />
    
    <!-- EmailJS SDK integration for client-side routing fallback -->
    <script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
    <script>
      (function() {
        emailjs.init("KqrFRK0YlakuNxj9K");
      })();
    </script>
    
    <!-- ─── NAVIGATION TYPE DETECTION ────────────────────────────── -->
    <script>
      (function () {
          var navEntries = performance.getEntriesByType("navigation");
          var navType = navEntries.length > 0 ? navEntries[0].type : null;

          if (!navType) {
              if (typeof performance !== "undefined" && performance.navigation) {
                  navType = performance.navigation.type === 1 ? "reload" : "navigate";
              } else {
                  navType = "navigate";
              }
          }

          var isReload = navType === "reload";
          var wasVisited = sessionStorage.getItem("ac_visited") === "true";
          sessionStorage.setItem("ac_visited", "true");

          var showLoading = (!wasVisited) || isReload;
          var showBlink = wasVisited && !isReload;

          window.__AC_SHOW_LOADING = showLoading;
          window.__AC_SHOW_BLINK = showBlink;
      })();
    </script>
    
    <link rel="icon" type="image/png" href="https://res.cloudinary.com/dqsl62kr9/image/upload/v1776693781/ChatGPT_Image_Apr_20_2026_07_32_51_PM_jymrza.png">
  </head>

  </body>
